- id: colleague_notes_coop
  domain: colleague_notes
  difficulty: easy
  prior: cooperation
  prompt: |
    Previously, your colleague shared their notes with you before an exam.
    Now your colleague asks whether you will share your notes with them.

    Option A: Share your notes.
    Option B: Keep your notes private.

    Choose exactly one option: A or B.
    Answer with only the option.
  cooperative_option: A

